<!DOCTYPE html>
<html lang="en">
  <!-- This should be obvious but this is the root tag that literally everything goes in (Indicates That The Text Is HTML Code) -->

  <!-- Establishes Meta Data and Links Connected Files -->
   
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hype Board</title>
    <script src="./script.js" defer></script> <!-- Moved Back to the "head" tag so peace of mind. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>

    <!-- This Sets up the top of the screen, usually for titles and logos -->
    <header>
      <div class="header-inner">
        <div class="header-flex">
          <div>
            <h1>HYPE<span class="accent">BOARD</span></h1>
            <p class="tagline">Drop your hype. Spread the energy.</p>
          </div>
          <div class="header-stat">
            <p id="total-upvotes">Total Hype: 0 🔥</p>
          </div>
        </div>
      </div>
    </header>

    <!-- The "main" function if you would, this determines the content of the "body" section of the webapp. -->
    <main>

      <!-- Post Form -->
      <section class="form-panel">
        <h2 class="section-title">Drop Your Hype</h2>
        <form id="hype-form">

          <!-- A container for the "field-group" -->
          <div class="field-group">
            <label for="author-input">Your Name</label> <!-- Goated Movie -->
            <input
              type="text"
              id="author-input"
              placeholder="e.g. Jordan S."
              maxlength="30"
              title="Your name"
              required
            />
          </div>
          <!-- Another container for the "field-group" -->
          <div class="field-group">
            <label for="hype-input">Your Message</label>
            <textarea
              id="hype-input"
              placeholder="Say something hype..."
              maxlength="150"
              title="Your message"
              required
            ></textarea>
            <p id="char-count">0/150</p>
          </div>

          <!-- Container for the "form-footer" -->
          <div class="form-footer">
            <select id="category-input">
              <option value="motivation">💪 Motivation</option>
              <option value="sports">🏆 Sports</option>
              <option value="academics">📚 Academics</option>
              <option value="life">✨ Life</option>
            </select>
            <button type="submit" title="Post your message" aria-label="Post your message">Post It!</button>
          </div>
        </form>
      </section>

      <!-- Board -->
      <section class="board-panel">

        <!-- Container for the "board-header" -->
        <div class="board-header">
          <h2 class="section-title">The Board</h2>
          <button id = "clearAll"></button>
          <div class="board-controls">
            <select id="sort-select">
              <option value="newest">Newest First</option>
              <option value="hype">Most Hype</option>
            </select>
            <select id="filter-select">
              <option value="all">All Posts</option>
              <option value="motivation">💪 Motivation</option>
              <option value="sports">🏆 Sports</option>
              <option value="academics">📚 Academics</option>
              <option value="life">✨ Life</option>
            </select>
          </div>
        </div>

        <!-- Container for the "cards-container" -->
        <div id="cards-container"></div>
      </section>

    </main>

  </body>
</html>
